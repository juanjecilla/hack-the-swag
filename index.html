<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎉 Community Bingo — Fun Facts</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header>
      <h1>🎉 Community Bingo</h1>
      <p class="tagline">Drop a fun fact about a colleague. Collect swag. 🏆</p>
    </header>

    <div id="authbar" class="authbar">
      <div id="signed-out" class="auth-state">
        <p>Sign in with Google to add fun facts.</p>
        <button id="signin-btn" type="button" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.5 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.3-.3-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.5 4.5 24 4.5 16.3 4.5 9.7 8.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5.4 0 10.3-2.1 14-5.5l-6.5-5.5C29.5 34.1 26.9 35 24 35c-5.2 0-9.6-3.3-11.2-7.9l-6.5 5C9.6 39 16.3 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.5 5.5c-.5.4 7-5 7-15 0-1.2-.1-2.3-.4-3.5z"/></svg>
          Sign in with Google
        </button>
      </div>
      <div id="signed-in" class="auth-state hidden">
        <span class="who">Signed in as <strong id="user-name"></strong></span>
        <button id="signout-btn" type="button" class="link-btn">Sign out</button>
      </div>
    </div>

    <form id="entry-form" autocomplete="off">
      <label>
        Fun fact
        <input id="fact" name="fact" type="text" maxlength="140"
               placeholder="e.g. Once coded for 24h straight on a hackathon" required />
      </label>
      <label>
        About who?
        <input id="person" name="person" type="text" maxlength="60"
               placeholder="Name of the person" required />
      </label>
      <label>
        GDG community
        <input id="gdgCommunity" name="gdgCommunity" type="text" maxlength="80"
               placeholder="e.g. GDG Madrid" required />
      </label>
      <label>
        Your name
        <input id="submittedBy" name="submittedBy" type="text" maxlength="60"
               placeholder="From your Google account" />
      </label>
      <label class="check">
        <input id="exactMatch" name="exactMatch" type="checkbox" />
        <span>Written <strong>exactly</strong> as it appears on the bingo card</span>
      </label>
      <p id="dupwarn" class="dupwarn" role="status"></p>
      <button id="submit-btn" type="submit">Add fun fact</button>
      <p id="status" class="status" role="status"></p>
    </form>

    <section class="board">
      <div class="board-head">
        <h2>Wall of fun facts</h2>
        <span id="count" class="count">0</span>
      </div>
      <input id="search" type="search" class="search"
             placeholder="🔍 Search facts, people, community…" aria-label="Search fun facts" />
      <ul id="entries" class="entries"></ul>
      <p id="empty" class="empty">No fun facts yet — be the first! ✨</p>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
